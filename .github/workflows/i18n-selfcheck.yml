name: i18n-swarm self-check

# Dogfood: run i18n-swarm's own drift-gate, built from this repo's HEAD, against every PR
# to this repo. Uses `version: file:.` (a local build) rather than the npm-published
# version, because the CLI evolves faster than releases go out -- this always exercises
# the actual composite action + CLI a PR is about to ship, not a stale registry version.
on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history: the check derives base..head from this

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build the CLI from HEAD
        run: |
          npm install
          npm run build

      - name: Run the i18n-swarm drift gate on this PR
        uses: ./
        with:
          version: file:.
