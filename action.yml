name: 'i18n-swarm localization drift gate'
description: 'Fail the pull request when a new hardcoded UI string is added without a translation key (Next.js / React / Vue).'
author: 'greymoth'

branding:
  icon: 'globe'
  color: 'gray-dark'

inputs:
  path:
    description: 'Directory to check (the app root). Default: the repository root.'
    required: false
    default: '.'
  config:
    description: >-
      Optional path to an i18n-swarm.config.json (brands / enums / ignorePaths).
      If set, it is copied to <path>/i18n-swarm.config.json so the check picks it
      up. Otherwise the check auto-discovers i18n-swarm.config.json at the repo root.
    required: false
    default: ''
  range:
    description: >-
      Optional git range "<base>..<head>" to check. If empty, it is derived from
      the event (pull_request: base..head; push: before..after; otherwise the
      working tree vs HEAD).
    required: false
    default: ''
  version:
    description: 'npm version or dist-tag of i18n-swarm to run.'
    required: false
    default: 'latest'
  github-token:
    description: >-
      Token used to post/update/delete the sticky PR comment on a `pull_request` /
      `pull_request_target` event. Needs `pull-requests: write` on the calling workflow
      (or job). Default: the workflow's own GITHUB_TOKEN. Ignored on non-PR events.
    required: false
    default: ${{ github.token }}

runs:
  using: 'composite'
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Run the i18n-swarm drift gate
      id: i18n_swarm
      shell: bash
      env:
        # Pass everything through env (never interpolate ${{ }} into the script body).
        INPUT_PATH: ${{ inputs.path }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_RANGE: ${{ inputs.range }}
        INPUT_VERSION: ${{ inputs.version }}
        EVENT_NAME: ${{ github.event_name }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        PUSH_BEFORE: ${{ github.event.before }}
        PUSH_AFTER: ${{ github.sha }}
      run: |
        set -uo pipefail
        # No `-e` here: the check's own exit code has to survive past this step (a
        # non-zero code from `npx` under `-e` would kill the step immediately, before
        # the PR-comment step below ever gets a chance to run).

        # Optional: place a suppression config where the check auto-discovers it.
        if [ -n "${INPUT_CONFIG}" ]; then
          if [ -f "${INPUT_CONFIG}" ]; then
            cp "${INPUT_CONFIG}" "${INPUT_PATH%/}/i18n-swarm.config.json"
            echo "i18n-swarm: using config ${INPUT_CONFIG}"
          else
            echo "i18n-swarm: config '${INPUT_CONFIG}' not found, ignoring." >&2
          fi
        fi

        # Decide the diff range. An explicit input wins; otherwise derive it from the event.
        RANGE="${INPUT_RANGE}"
        if [ -z "${RANGE}" ]; then
          case "${EVENT_NAME}" in
            pull_request|pull_request_target)
              if [ -n "${PR_BASE_SHA}" ] && [ -n "${PR_HEAD_SHA}" ]; then
                RANGE="${PR_BASE_SHA}..${PR_HEAD_SHA}"
              fi
              ;;
            push)
              if [ -n "${PUSH_BEFORE}" ] && [ "${PUSH_BEFORE}" != "0000000000000000000000000000000000000000" ]; then
                RANGE="${PUSH_BEFORE}..${PUSH_AFTER}"
              fi
              ;;
          esac
        fi

        echo "i18n-swarm: checking '${INPUT_PATH}'${RANGE:+ over range ${RANGE}}"

        COMMENT_FILE="${RUNNER_TEMP}/i18n-swarm-pr-comment.md"
        rm -f "${COMMENT_FILE}"

        # Wrap the existing `i18n-swarm check`. It exits 1 on a new un-keyed UI string.
        # `--comment` additionally writes the sticky PR-comment body (only when there is
        # something to report -- a clean run removes any stale file instead), consumed by
        # the next step. The exit code is captured, not let to kill this step, so that step
        # still runs on a failing check.
        if [ -n "${RANGE}" ]; then
          npx --yes "i18n-swarm@${INPUT_VERSION}" check "${RANGE}" --repo "${INPUT_PATH}" --comment "${COMMENT_FILE}"
        else
          npx --yes "i18n-swarm@${INPUT_VERSION}" check --repo "${INPUT_PATH}" --comment "${COMMENT_FILE}"
        fi
        CODE=$?

        echo "exit_code=${CODE}" >> "${GITHUB_OUTPUT}"
        echo "comment_file=${COMMENT_FILE}" >> "${GITHUB_OUTPUT}"

    - name: Post, update, or clear the PR comment
      # Only a pull_request(_target) event has a PR to comment on; a push (or any other
      # trigger) just falls through to the exit-code gate below, same as before.
      if: always() && (github.event_name == 'pull_request' || github.event_name == 'pull_request_target')
      uses: actions/github-script@v7
      env:
        # Passed through env, not interpolated into the script body, so a path
        # containing a backslash (e.g. a Windows runner's RUNNER_TEMP) can never be
        # misread as a JS string escape.
        COMMENT_FILE: ${{ steps.i18n_swarm.outputs.comment_file }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const marker = '<!-- i18n-swarm:pr-comment -->';
          const commentFile = process.env.COMMENT_FILE || '';
          const body = commentFile && fs.existsSync(commentFile) ? fs.readFileSync(commentFile, 'utf8') : null;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            per_page: 100,
          });
          const existing = comments.find((c) => c.body && c.body.startsWith(marker));

          if (body) {
            // Update in place when this run's own prior comment is still there, so a
            // series of pushes to the same PR leaves one comment, not a growing thread.
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body,
              });
            }
          } else if (existing) {
            // The diff is clean now (fixed in a later push) -- remove the stale warning
            // instead of leaving a comment nobody needs to read.
            await github.rest.issues.deleteComment({
              owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id,
            });
          }

    - name: Enforce the drift-gate result
      shell: bash
      run: exit '${{ steps.i18n_swarm.outputs.exit_code }}'
